<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Code - Camera Test</title>
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #111; 
            margin: 0; 
            font-family: sans-serif;
        }
        /* Холст, на котором будет происходить вся магия */
        canvas { 
            background: #000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            /* Визуально уменьшаем для экрана, но внутри он остается 1080x1080 */
            width: 100%; 
            max-width: 400px; 
            border-radius: 12px;
        }
        /* Скрываем оригинальное видео, оно нам нужно только как источник данных */
        video { display: none; }
    </style>
</head>
<body>

<video id="videoElement" autoplay playsinline></video>

<canvas id="mainCanvas" width="1080" height="1080"></canvas>

<script>
    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');

    async function initCamera() {
        try {
            // Запрашиваем доступ к камере (задней, если доступна)
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
            
            // Ждем, пока видео прогрузится, и запускаем цикл отрисовки
            video.onloadedmetadata = () => {
                video.play();
                requestAnimationFrame(drawLoop);
            };
        } catch (err) {
            console.error("Ошибка доступа к камере: ", err);
            alert("Пожалуйста, разрешите доступ к камере в браузере.");
        }
    }

    // Бесконечный цикл, который рисует кадры из видео на холст
    function drawLoop() {
        // Отрисовываем видео, растягивая его на наши 1080x1080
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Запускаем следующий кадр
        requestAnimationFrame(drawLoop);
    }

    // Старт
    initCamera();
</script>

</body>
</html>
