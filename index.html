<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yliko Color Code - Camera Test</title>
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #111; 
            margin: 0; 
            font-family: sans-serif;
            overflow: hidden;
        }
        canvas { 
            background: #000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            /* Делаем так, чтобы холст помещался на экран монитора, сохраняя пропорции телефона */
            height: 90vh; 
            aspect-ratio: 9/16; 
            border-radius: 12px;
        }
        video { display: none; }
    </style>
</head>
<body>

<video id="videoElement" autoplay playsinline></video>
<canvas id="mainCanvas" width="1080" height="1920"></canvas>

<script>
    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
            
            video.onloadedmetadata = () => {
                video.play();
                requestAnimationFrame(drawLoop);
            };
        } catch (err) {
            console.error("Ошибка доступа к камере: ", err);
            alert("Пожалуйста, разрешите доступ к камере в браузере.");
        }
    }

    function drawLoop() {
        // Очищаем холст перед каждым кадром
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Математика для правильного заполнения прямоугольника (без искажений пропорций)
        const scale = Math.max(canvas.width / video.videoWidth, canvas.height / video.videoHeight);
        const x = (canvas.width / 2) - (video.videoWidth / 2) * scale;
        const y = (canvas.height / 2) - (video.videoHeight / 2) * scale;
        
        // Рисуем отцентрированное видео
        ctx.drawImage(video, x, y, video.videoWidth * scale, video.videoHeight * scale);
        
        requestAnimationFrame(drawLoop);
    }

    initCamera();
</script>

</body>
</html>
