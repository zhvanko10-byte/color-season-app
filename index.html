<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ylikocolor code</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --accent: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Open Sans', sans-serif;
            height: 100vh; overflow: hidden;
        }

        /* ЕКРАНИ */
        .screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            flex-direction: column;
        }
        .screen.active { display: flex; }

        /* ГОЛОВНИЙ ЕКРАН */
        #home-screen {
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .brand-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.5rem;
            text-transform: uppercase;
            color: #fff;
            /* Та сама стильна обводка */
            text-shadow: 
                -2px -2px 0 #000,  
                 2px -2px 0 #000,
                -2px  2px 0 #000,
                 2px  2px 0 #000;
            margin-bottom: 40px;
            line-height: 1;
        }

        .main-nav {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 80%;
            max-width: 300px;
        }

        .btn {
            padding: 20px;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid #fff;
            font-size: 0.9rem;
        }

        .btn-filled { background: #fff; color: #000; }
        .btn-outline { background: transparent; color: #fff; }

        /* КАМЕРА ТА ПАЛІТРИ */
        #camera-screen { background: #000; }
        .video-wrapper { flex: 1; position: relative; }
        #v-stream { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        .palette-overlay {
            position: absolute;
            bottom: 30px;
            left: 0; width: 100%;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dots-row {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            width: 100%;
            padding: 10px 0;
            scrollbar-width: none;
        }
        .dot {
            min-width: 60px; height: 60px;
            border-radius: 50%;
            border: 2px solid #fff;
            flex-shrink: 0;
        }

        /* ТЕСТ */
        #quiz-screen { background: #000; padding-top: 60px; }
        .swiper { width: 85%; height: 70vh; }
        .swiper-slide {
            background: #fff; border-radius: 30px; color: #000;
            overflow: hidden; display: flex; flex-direction: column;
        }
        .q-img { width: 100%; height: 50%; background-size: cover; background-position: center; }
        .q-content { padding: 20px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .q-btns { display: flex; gap: 10px; }
        .q-btn { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }

        .back-link {
            position: absolute; top: 20px; left: 20px;
            color: #fff; font-size: 1.5rem; z-index: 100; background: none; border: none;
        }
    </style>
</head>
<body>

    <div class="screen active" id="home-screen">
        <h1 class="brand-name">Ylikocolor code</h1>
        <div class="main-nav">
            <button class="btn btn-filled" onclick="openCam()">ПОЧАТИ</button>
            <button class="btn btn-outline" onclick="openTest()">ПРОЙТИ ТЕСТ</button>
        </div>
    </div>

    <div class="screen" id="camera-screen">
        <button class="back-link" onclick="closeCam()"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="video-wrapper">
            <video id="v-stream" autoplay playsinline></video>
            <div class="palette-overlay">
                <div class="dots-row">
                    <div class="dot" style="background: #FFD1DC;"></div>
                    <div class="dot" style="background: #B0E0E6;"></div>
                    <div class="dot" style="background: #F5F5DC;"></div>
                    <div class="dot" style="background: #98FF98;"></div>
                    <div class="dot" style="background: #E6E6FA;"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="screen" id="quiz-screen">
        <button class="back-link" onclick="navTo('home-screen')"><i class="fa-solid fa-xmark"></i></button>
        <div class="swiper">
            <div class="swiper-wrapper" id="q-list"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const testItems = [
            { t: 'Світлий колорит', d: 'Світле волосся та очі.', i: 'https://images.unsplash.com/photo-1509967419530-da38b4704bc6?w=400' },
            { t: 'Темний колорит', d: 'Насичені темні риси.', i: 'https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=400' }
        ];

        const qList = document.getElementById('q-list');
        testItems.forEach(item => {
            qList.innerHTML += `
                <div class="swiper-slide">
                    <div class="q-img" style="background-image:url('${item.i}')"></div>
                    <div class="q-content">
                        <h2>${item.t}</h2>
                        <p>${item.d}</p>
                        <div class="q-btns">
                            <button class="q-btn" style="background:#eee" onclick="swiper.slideNext()">НІ</button>
                            <button class="q-btn" style="background:#000; color:#fff" onclick="alert('Ваш тип: ${item.t}')">ТАК</button>
                        </div>
                    </div>
                </div>`;
        });

        const swiper = new Swiper('.swiper', { effect: 'cards' });

        function navTo(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        let stream = null;
        async function openCam() {
            navTo('camera-screen');
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('v-stream').srcObject = stream;
        }

        function closeCam() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            navTo('home-screen');
        }

        function openTest() { navTo('quiz-screen'); swiper.update(); }
    </script>
</body>
</html>
