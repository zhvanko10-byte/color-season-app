<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Season Palette</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        :root {
            --bg-dark: #121212;
            --gold: #b08d57;
            --white: #ffffff;
            --gray: #2d2d2d;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: white; height: 100%; overflow: hidden;
        }

        /* ГОЛОВНА СТОРІНКА */
        .home-screen {
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; height: 100vh; text-align: center; padding: 20px;
        }

        .home-screen h1 { font-size: 2.8rem; margin-bottom: 5px; letter-spacing: 3px; font-weight: 300; }
        .home-screen p { color: #888; font-size: 0.9rem; letter-spacing: 1px; margin-bottom: 30px; }

        .main-btn {
            padding: 20px 50px; background-color: var(--gold); color: white;
            border: none; border-radius: 50px; font-weight: bold; font-size: 1rem;
            cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: 0.3s;
        }

        /* ТЕСТОВЕ ВІКНО */
        #quiz-container {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark); z-index: 1000;
        }

        .close-x { position: absolute; top: 20px; right: 20px; font-size: 30px; color: white; background: none; border: none; cursor: pointer; z-index: 1100; }

        .swiper { width: 85%; max-width: 360px; height: 80vh; margin-top: 60px; }

        .swiper-slide {
            background: var(--white); border-radius: 30px; color: var(--gray);
            overflow: hidden; display: flex; flex-direction: column;
        }

        .card-img { width: 100%; height: 50%; background-size: cover; background-position: center; }

        .card-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }

        h2 { margin: 0; color: var(--gold); font-size: 1.25rem; text-align: center; }
        .info-text { font-size: 0.85rem; line-height: 1.4; margin: 10px 0; color: #444; }
        .test-hint { background: #f9f6f2; padding: 10px; border-radius: 12px; font-size: 0.8rem; border-left: 4px solid var(--gold); }

        .action-btns { display: flex; gap: 10px; margin-top: 15px; }

        .btn-ui { flex: 1; padding: 16px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-no { background: #f0f0f0; color: #777; }
        .btn-yes { background: var(--gold); color: white; }

        #result-popup {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 1200; flex-direction: column; justify-content: center;
            align-items: center; padding: 30px; text-align: center; color: var(--gray);
        }
    </style>
</head>
<body>

    <div class="home-screen">
        <h1>SEASON PALETTE</h1>
        <p>ВИЗНАЧ СВІЙ ПРИРОДНИЙ ТИП КРАСИ</p>
        <button class="main-btn" onclick="startQuiz()">ПОЧАТИ ТЕСТ</button>
    </div>

    <div id="quiz-container">
        <button class="close-x" onclick="exitQuiz()">✕</button>
        <div class="swiper">
            <div class="swiper-wrapper" id="slides-wrapper"></div>
        </div>

        <div id="result-popup">
            <div class="res-box">
                <span style="color: #bbb; font-size: 0.7rem; letter-spacing: 2px;">ВАШ КОЛОРИТ:</span>
                <h1 id="final-title"></h1>
                <p id="final-desc" style="color: #666; font-size: 0.95rem; margin-bottom: 25px;"></p>
                <button class="btn-ui btn-yes" style="width: 100%;" onclick="openPalette()">ВІДКРИТИ ПАЛІТРУ</button>
                <button class="btn-ui btn-no" style="width: 100%; margin-top: 10px; background: none;" onclick="exitQuiz()">На головну</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        // Ось тут я вставив прямі посилання на картинки
        const quizData = [
            { id: "light", title: "Світлий колорит (Light)", img: "https://googleusercontent.com/image_generation_content/3", desc: "Волосся світле від самого кореня, брови та вії теж світлі. Очі дуже світлі: блакитні, сірі.", test: "Чорний колір “з’їдає” вас — видно спочатку одяг, а не обличчя." },
            { id: "deep", title: "Глибокий темний колорит (Deep)", img: "https://googleusercontent.com/image_generation_content/4", desc: "Дуже темне волосся, темні очі та густі темні вії. Обличчя виразне навіть без макіяжу.", test: "У чисто чорному кольорі ви виглядаєте дорого та яскраво." },
            { id: "cool", title: "Холодний колорит (Cool)", img: "https://googleusercontent.com/image_generation_content/3", desc: "Волосся без золота (попелясте, сиве). Очі холодні. Шкіра з рожевим підтоном.", test: "Срібло освіжає обличчя, а золото робить його жовтуватим." },
            { id: "warm", title: "Теплий колорит (Warm)", img: "https://googleusercontent.com/image_generation_content/4", desc: "Волосся з теплим підтоном (руде, медове). Часто є ластовиння. Вени зелені.", test: "Теплі кольори (карамель, теракот) роблять вас свіжішою." },
            { id: "clear", title: "Контрастний колорит (Clear)", img: "https://googleusercontent.com/image_generation_content/5", desc: "Високий контраст: темні очі + світле волосся або навпаки. Типаж “Білосніжка”.", test: "Вам пасують чіткі контрасти: чорний з білим, яскраво-червоний." },
            { id: "soft", title: "М’який збалансований колорит (Soft)", img: "https://googleusercontent.com/image_generation_content/5", desc: "Немає різких контрастів. Все виглядає “середньо”. Обличчя м’яке і спокійне.", test: "Яскраві кольори “перекрикують” вас, краще виглядають спокійні відтінки." }
        ];

        const wrapper = document.getElementById('slides-wrapper');
        quizData.forEach(item => {
            const slide = document.createElement('div');
            slide.className = 'swiper-slide';
            slide.innerHTML = `
                <div class="card-img" style="background-image: url('${item.img}')"></div>
                <div class="card-body">
                    <div>
                        <h2>${item.title}</h2>
                        <p class="info-text">${item.desc}</p>
                        <div class="test-hint"><strong>ТЕСТ:</strong> ${item.test}</div>
                    </div>
                    <div class="action-btns">
                        <button class="btn-ui btn-no" onclick="nextSlide()">НІ</button>
                        <button class="btn-ui btn-yes" onclick="showResult('${item.title}', '${item.desc}', '${item.id}')">ТАК</button>
                    </div>
                </div>
            `;
            wrapper.appendChild(slide);
        });

        let swiper = new Swiper('.swiper', { effect: 'cards', grabCursor: true });
        let currentResultId = "";

        function startQuiz() { document.getElementById('quiz-container').style.display = 'block'; swiper.update(); }
        function exitQuiz() { document.getElementById('quiz-container').style.display = 'none'; document.getElementById('result-screen').style.display = 'none'; }
        function nextSlide() { if (swiper.isEnd) swiper.slideTo(0); else swiper.slideNext(); }
        function showResult(title, desc, id) { currentResultId = id; document.getElementById('result-popup').style.display = 'flex'; document.getElementById('final-title').innerText = title; document.getElementById('final-desc').innerText = desc; }
        function openPalette() { alert("Перехід до палітри: " + currentResultId); exitQuiz(); }
    </script>
</body>
</html>
