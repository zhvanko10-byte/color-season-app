<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ART Palette & Camera</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #000; color: white; margin: 0; padding: 0; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        
        /* Секция камеры */
        #camera-container { flex-grow: 1; position: relative; overflow: hidden; background: #000; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Оверлей маски для лица/фигуры */
        .mask { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px dashed rgba(255,255,255,0.5); border-radius: 50% 50% 40% 40%; width: 250px; height: 350px; pointer-events: none; }

        /* Панель управления */
        .controls { background: #1a1a1a; padding: 15px; border-top-left-radius: 20px; border-top-right-radius: 20px; }
        select { width: 100%; padding: 12px; border-radius: 10px; background: #333; color: white; border: none; font-size: 16px; margin-bottom: 15px; }
        
        /* Сетка палитры */
        .palette-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; max-height: 150px; overflow-y: auto; padding: 5px; }
        .color-box { aspect-ratio: 1; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="camera-container">
            <video id="video" autoplay playsinline></video>
            <div class="mask"></div>
        </div>

        <div class="controls">
            <select id="typeSelect" onchange="updatePalette()">
                <option value="light">Light</option>
                <option value="deep">Deep</option>
                <option value="warm">Warm</option>
                <option value="cool">Cool</option>
                <option value="clear">Clear</option>
                <option value="soft">Soft</option>
            </select>
            <div id="palette" class="palette-grid"></div>
        </div>
    </div>

    <script>
        // Данные из файла "colors приложение АРТ.pptx" 
        const PALETTES = {
            light: ["#FFFFF0", "#FFFFFF", "#FAEBD7", "#D2B48C", "#BC8F8F", "#A0522D", "#DEB887", "#696969", "#808080", "#D3D3D3", "#2F4F4F", "#8FBC8F", "#DC143C", "#000080", "#800080", "#FFB6C1", "#FF69B4", "#DB7093", "#FFA07A", "#F0E68C", "#6A5ACD", "#87CEEB", "#7B68EE", "#4169E1", "#00BFFF", "#AFEEEE", "#9ACD32", "#008000", "#3CB371", "#008080"],
            deep: ["#FFFFF0", "#FFFFFF", "#8B4513", "#D2B48C", "#BC8F8F", "#3B1D1D", "#030000", "#2B2A2A", "#454545", "#160859", "#0C300C", "#0B4A0A", "#0A4A41", "#39522D", "#380A19", "#F0F26B", "#BAD45D", "#D681D2", "#E83C3C", "#B82C2C", "#C9240A", "#3E0F59", "#5D339C", "#52070E", "#52073C", "#2F591E", "#0C382D", "#0D2185", "#1E40E8", "#0F4E6E"],
            warm: ["#FFFFF0", "#FFFFFF", "#FAEBD7", "#D2B48C", "#99715D", "#4A310B", "#3D3830", "#292520", "#3D2E22", "#313A66", "#224A31", "#38330A", "#736A1D", "#999782", "#5A337A", "#82D7D9", "#F5F37F", "#E6BF35", "#E67B17", "#F0950C", "#A1D158", "#F7AA83", "#BD5709", "#E8571E", "#EB4949", "#AD3311", "#E31B1B", "#AA1BE3", "#3AC2E8", "#658C5D"],
            cool: ["#FFFFFF", "#FAEBD7", "#F0F0E4", "#70736F", "#C0C4C4", "#6D93A6", "#2B0606", "#152433", "#000000", "#03331A", "#1A472C", "#09544F", "#571CB0", "#1621C4", "#C90C4B", "#E69AD5", "#A76CAB", "#DE41F0", "#BDDECB", "#158244", "#0C614C", "#1B8A8C", "#52E1E3", "#96DFEB", "#0A64A8", "#5C1E61", "#999EE8", "#5157B0", "#341994", "#0C1761"],
            clear: ["#FFFFF0", "#FFFFFF", "#D2B48C", "#70736F", "#C0C4C4", "#3B1D1D", "#030000", "#2B2A2A", "#160859", "#571CB0", "#1621C4", "#0D2185", "#066B14", "#047D34", "#C41B1B", "#82D7D9", "#F2F072", "#999EE8", "#F0A35B", "#C42585", "#CF2B2B", "#8A0F0F", "#90CF3E", "#14E09C", "#136120", "#315BC4", "#0EC2E6", "#38178A", "#46B4EB", "#0DA1B8"],
            soft: ["#FFFFFF", "#D2B48C", "#BC8F8F", "#E0BF87", "#6E4931", "#826653", "#8B4513", "#707050", "#999782", "#3D3830", "#292520", "#313A66", "#243042", "#08535E", "#451733", "#e8b8a0", "#C456A0", "#bd4626", "#82d7d9", "#258f2a", "#3f9170", "#69c27f", "#2f5c35", "#153d0d", "#999ee8", "#5157b0", "#103575", "#401f6b", "#5a41a6", "#59190f"]
        };

        // Запуск камеры
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                document.getElementById('video').srcObject = stream;
            } catch (err) {
                console.error("Ошибка доступа к камере: ", err);
            }
        }

        // Обновление палитры
        function updatePalette() {
            const type = document.getElementById('typeSelect').value;
            const container = document.getElementById('palette');
            container.innerHTML = '';
            
            PALETTES[type].forEach(color => {
                const box = document.createElement('div');
                box.className = 'color-box';
                box.style.backgroundColor = color;
                container.appendChild(box);
            });
        }

        // Инициализация при старте
        window.onload = () => {
            startCamera();
            updatePalette();
            if (window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            }
        };
    </script>
</body>
</html>
