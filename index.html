<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Season App</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            color: white;
        }

        /* ГЛАВНЫЙ ЭКРАН */
        #main-page {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 100;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: opacity 0.5s ease;
        }

        #main-page h1 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-style: italic;
            margin-bottom: 15px;
        }

        .start-btn {
            background: none;
            color: white;
            border: 1px solid white;
            padding: 15px 45px;
            border-radius: 30px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
        }

        /* ЭКРАН ПРИЛОЖЕНИЯ */
        #app-page {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
        }

        #video-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        #video { width: 100%; height: 100%; object-fit: cover; }

        #ui-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            pointer-events: none;
        }

        #header { padding: 60px 20px; text-align: center; }

        #palette-name {
            font-family: 'Playfair Display', serif;
            font-size: 50px;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-style: italic;
            margin: 0;
            color: white;
            text-shadow: -1.5px -1.5px 0 #000, 1.5px -1.5px 0 #000, -1.5px 1.5px 0 #000, 1.5px 1.5px 0 #000;
        }

        .swiper { width: 100%; height: 100%; pointer-events: auto; }

        .swiper-slide {
            display: flex;
            align-items: center;
            justify-content: center;
            padding-bottom: 80px;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            width: 85%;
            max-width: 400px;
        }

        .dot {
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.7);
        }

        .swiper-pagination-bullet { background: #fff; opacity: 0.4; }
        .swiper-pagination-bullet-active { opacity: 1; width: 22px; border-radius: 5px; }
        .swiper-pagination { bottom: 40px !important; }
    </style>
</head>
<body>

    <div id="main-page">
        <h1>Colors</h1>
        <button class="start-btn" onclick="startApp()">Начать</button>
    </div>

    <div id="app-page">
        <div id="video-container"><video id="video" autoplay playsinline muted></video></div>
        <div id="ui-overlay">
            <div id="header"><h1 id="palette-name">LIGHT</h1></div>
            <div class="swiper">
                <div class="swiper-wrapper" id="palette-wrapper"></div>
                <div class="swiper-pagination"></div>
            </div>
        </div>
    </div>

    <script>
        const paletteData = [
            { name: "light", colors: ["#FFFFF0","#FFFFFF","#FAEBD7","#D2B48C","#BC8F8F","#A0522D","#DEB887","#696969","#808080","#D3D3D3","#2F4F4F","#8FBC8F","#DC143C","#000080","#800080","#FFB6C1","#FF69B4","#DB7093","#FFA07A","#F0E68C","#6A5ACD","#87CEEB","#7B68EE","#4169E1","#00BFFF","#AFEEEE","#9ACD32","#008000","#3CB371","#008080"] },
            { name: "deep", colors: ["#FFFFF0","#FFFFFF","#8B4513","#D2B48C","#BC8F8F","#3b1d1d","#030000","#2b2a2a","#454545","#160859","#0c300c","#0b4a0a","#0a4a41","#39522d","#380a19","#f0f26b","#bad45d","#d681d2","#e83c3c","#b82c2c","#c9240a","#3e0f59","#5d339c","#52070e","#52073c","#2f591e","#0c382d","#0d2185","#1e40e8","#0f4e6e"] },
            { name: "warm", colors: ["#FFFFF0","#FFFFFF","#FAEBD7","#D2B48C","#99715d","#4a310b","#3d3830","#292520","#3d2e22","#313a66","#224a31","#38330a","#736a1d","#999782","#5a337a","#82d7d9","#f5f37f","#e6bf35","#e67b17","#f0950c","#a1d158","#f7aa83","#bd5709","#e8571e","#eb4949","#ad3311","#e31b1b","#aa1be3","#3ac2e8","#658c5d"] },
            { name: "cool", colors: ["#FFFFFF","#FAEBD7","#f0f0e4","#70736f","#c0c4c4","#6d93a6","#2b0606","#152433","#000000","#03331a","#1a472c","#09544f","#571cb0","#1621c4","#c90c4b","#e69ad5","#a76cab","#de41f0","#bddecb","#158244","#0c614c","#1b8a8c","#52e1e3","#96dfeb","#0a64a8","#5c1e61","#999ee8","#5157b0","#341994","#0c1761"] },
            { name: "clear", colors: ["#FFFFF0","#FFFFFF","#D2B48C","#70736f","#c0c4c4","#3b1d1d","#030000","#2b2a2a","#160859","#571cb0","#1621c4","#0d2185","#066b14","#047d34","#c41b1b","#82d7d9","#f2f072","#999ee8","#f0a35b","#c42585","#cf2b2b","#8a0f0f","#90cf3e","#14e09c","#136120","#315bc4","#0ec2e6","#38178a","#46b4eb","#0da1b8"] },
            { name: "soft", colors: ["#FFFFFF","#D2B48C","#BC8F8F","#e0bf87","#6e4931","#826653","#8B4513","#707050","#999782","#3d3830","#292520","#313a66","#243042","#08535e","#451733","#e8b8a0","#c456a0","#bd4626","#82d7d9","#258f2a","#3f9170","#69c27f","#2f5c35","#153d0d","#999ee8","#5157b0","#103575","#401f6b","#5a41a6","#59190f"] }
        ];

        function startApp() {
            document.getElementById('main-page').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('main-page').style.display = 'none';
                document.getElementById('app-page').style.display = 'block';
                setupCamera();
            }, 500);
        }

        function initSwiper() {
            const wrapper = document.getElementById('palette-wrapper');
            paletteData.forEach(p => {
                const slide = document.createElement('div');
                slide.className = 'swiper-slide';
                const grid = document.createElement('div');
                grid.className = 'color-grid';
                p.colors.forEach(c => {
                    const dot = document.createElement('div');
                    dot.className = 'dot'; dot.style.backgroundColor = c;
                    grid.appendChild(dot);
                });
                slide.appendChild(grid);
                wrapper.appendChild(slide);
            });
            new Swiper('.swiper', {
                loop: true,
                pagination: { el: '.swiper-pagination', clickable: true },
                on: { slideChange: function () { document.getElementById('palette-name').innerText = paletteData[this.realIndex].name; } }
            });
        }

        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 3840 } } });
                document.getElementById('video').srcObject = stream;
            } catch (err) {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => document.getElementById('video').srcObject = s);
            }
        }
        initSwiper();
    </script>
</body>
</html>
