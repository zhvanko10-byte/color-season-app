<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yliko Color Code - Pixel Masking</title>
    <script src="https://cdn.jsdelivr.net/npm/heic2any/dist/heic2any.min.js"></script>
    <style>
        body { 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #111; 
            margin: 0; 
            font-family: sans-serif;
            overflow: hidden;
            gap: 15px;
        }
        canvas { 
            background: #000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            height: 85vh; 
            aspect-ratio: 9/16; 
            border-radius: 12px;
        }
        video { display: none; }
        
        .upload-btn {
            background: #4CAF50;
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: background 0.3s;
            text-align: center;
            min-width: 250px;
        }
        .upload-btn.loading {
            background: #f39c12;
            pointer-events: none;
        }
        input[type="file"] { display: none; }
        
        #status {
            color: #4CAF50;
            font-size: 16px;
            height: 20px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="status">Загрузка ИИ... Пожалуйста, подождите.</div>

<label class="upload-btn" id="uploadLabel" style="display: none;">
    Загрузить фото
    <input type="file" id="imageUpload" accept="image/*, .heic, .heif">
</label>

<video id="videoElement" autoplay playsinline></video>
<canvas id="mainCanvas" width="1080" height="1920"></canvas>

<script type="module">
    import { ImageSegmenter, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const uploadLabel = document.getElementById('uploadLabel');
    const statusText = document.getElementById('status');
    
    let processedCanvas = null; // Здесь будет лежать готовое фото с "дыркой"
    let segmenter = null;

    // --- 1. ЗАГРУЗКА ИИ ---
    async function initAI() {
        try {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            segmenter = await ImageSegmenter.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_multiclass_256x256/float32/latest/selfie_multiclass_256x256.tflite",
                    delegate: "GPU"
                },
                runningMode: "IMAGE",
                outputCategoryMask: true,
                outputConfidenceMasks: false
            });
            
            statusText.style.color = 'white';
            statusText.innerText = "ИИ готов!";
            uploadLabel.style.display = "block";
            setTimeout(() => statusText.style.display = 'none', 3000);
        } catch (error) {
            console.error(error);
            statusText.style.color = 'red';
            statusText.innerText = "Ошибка загрузки ИИ. Проверьте интернет.";
        }
    }

    // --- 2. ЖЕЛЕЗОБЕТОННОЕ ВЫРЕЗАНИЕ (Попиксельное) ---
    async function processImageToMask(img) {
        statusText.style.display = 'block';
        statusText.innerText = "Нейросеть вырезает одежду...";
        
        // Сжимаем фото до безопасных размеров (не больше 1080px), чтобы браузер не вылетал
        const MAX_SIZE = 1080;
        let pWidth = img.width;
        let pHeight = img.height;
        if (pWidth > MAX_SIZE || pHeight > MAX_SIZE) {
            const ratio = Math.min(MAX_SIZE / pWidth, MAX_SIZE / pHeight);
            pWidth = Math.round(pWidth * ratio);
            pHeight = Math.round(pHeight * ratio);
        }

        // Создаем холст для работы с пикселями
        processedCanvas = document.createElement('canvas');
        processedCanvas.width = pWidth;
        processedCanvas.height = pHeight;
        const pCtx = processedCanvas.getContext('2d', { willReadFrequently: true });
        
        // Рисуем туда оригинальное фото
        pCtx.drawImage(img, 0, 0, pWidth, pHeight);

        try {
            // Отправляем холст в нейросеть
            const segmentationResult = await segmenter.segment(processedCanvas);
            const maskDataArray = segmentationResult.categoryMask.getAsUint8Array();
            
            // Вытягиваем массив пикселей из нашей фотографии
            const imageData = pCtx.getImageData(0, 0, pWidth, pHeight);
            const data = imageData.data;

            // Пробегаемся по каждому пикселю
            for (let i = 0; i < maskDataArray.length; i++) {
                if (maskDataArray[i] === 4) { 
                    // Категория 4 — это одежда. Делаем этот пиксель на фото полностью прозрачным (Альфа = 0)
                    data[i * 4 + 3] = 0; 
                }
            }

            // Возвращаем измененные пиксели обратно на холст
            pCtx.putImageData(imageData, 0, 0);
            
            statusText.innerText = "Готово!";
            setTimeout(() => statusText.style.display = 'none', 2000);
        } catch (err) {
            console.error("Ошибка сегментации:", err);
            statusText.innerText = "Ошибка при вырезании!";
        }
    }

    // --- 3. ОБРАБОТКА ЗАГРУЗКИ ---
    document.getElementById('imageUpload').addEventListener('change', async function(e) {
        let file = e.target.files[0];
        if (!file) return;

        uploadLabel.innerHTML = 'Обработка...';
        uploadLabel.classList.add('loading');

        const isHeic = file.name.toLowerCase().endsWith('.heic') || file.name.toLowerCase().endsWith('.heif');

        if (isHeic) {
            try {
                const convertedBlob = await heic2any({ blob: file, toType: "image/jpeg", quality: 0.8 });
                file = Array.isArray(convertedBlob) ? convertedBlob[0] : convertedBlob;
            } catch (error) {
                alert("Не удалось прочитать HEIC.");
                uploadLabel.innerHTML = 'Загрузить фото';
                uploadLabel.classList.remove('loading');
                return;
            }
        }

        const img = new Image();
        img.onload = async function() {
            await processImageToMask(img); // Запускаем вырезание
            uploadLabel.innerHTML = 'Загрузить другое фото';
            uploadLabel.classList.remove('loading');
        }
        img.src = URL.createObjectURL(file);
    });

    // --- 4. КАМЕРА ---
    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                requestAnimationFrame(drawLoop);
            };
        } catch (err) {
            console.error("Ошибка камеры: ", err);
        }
    }

    // --- 5. ЦИКЛ ОТРИСОВКИ ---
    function drawLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. СНАЧАЛА рисуем камеру (самый нижний слой)
        const camScale = Math.max(canvas.width / video.videoWidth, canvas.height / video.videoHeight);
        const camX = (canvas.width / 2) - (video.videoWidth / 2) * camScale;
        const camY = (canvas.height / 2) - (video.videoHeight / 2) * camScale;
        ctx.drawImage(video, camX, camY, video.videoWidth * camScale, video.videoHeight * camScale);

        // 2. ЗАТЕМ сверху накидываем готовое фото (там, где одежда, фото прозрачное, поэтому видно камеру)
        if (processedCanvas) {
            const scale = Math.max(canvas.width / processedCanvas.width, canvas.height / processedCanvas.height);
            const x = (canvas.width / 2) - (processedCanvas.width / 2) * scale;
            const y = (canvas.height / 2) - (processedCanvas.height / 2) * scale;
            const w = processedCanvas.width * scale;
            const h = processedCanvas.height * scale;
            
            ctx.drawImage(processedCanvas, x, y, w, h);
        }
        
        requestAnimationFrame(drawLoop);
    }

    initCamera();
    initAI();
</script>
</body>
</html>
