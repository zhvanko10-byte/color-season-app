<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yliko Color Code - Universal Upload</title>
    <script src="https://cdn.jsdelivr.net/npm/heic2any/dist/heic2any.min.js"></script>
    <style>
        body { 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #111; 
            margin: 0; 
            font-family: sans-serif;
            overflow: hidden;
            gap: 15px;
        }
        canvas { 
            background: #000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            height: 85vh; 
            aspect-ratio: 9/16; 
            border-radius: 12px;
        }
        video { display: none; }
        
        .upload-btn {
            background: #007AFF;
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: background 0.3s;
            text-align: center;
            min-width: 200px;
        }
        .upload-btn.loading {
            background: #f39c12; /* Цвет ожидания */
            pointer-events: none;
        }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<label class="upload-btn" id="uploadLabel">
    Загрузить фото
    <input type="file" id="imageUpload" accept="image/*, .heic, .heif">
</label>

<video id="videoElement" autoplay playsinline></video>
<canvas id="mainCanvas" width="1080" height="1920"></canvas>

<script>
    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const uploadLabel = document.getElementById('uploadLabel');
    
    let userPhoto = null;

    // --- ОБРАБОТКА ЗАГРУЗКИ И КОНВЕРТАЦИИ ФОТО ---
    document.getElementById('imageUpload').addEventListener('change', async function(e) {
        let file = e.target.files[0];
        if (!file) return;

        // Проверяем, это ли формат HEIC/HEIF (Apple)
        const isHeic = file.name.toLowerCase().endsWith('.heic') || file.name.toLowerCase().endsWith('.heif');

        if (isHeic) {
            // Меняем кнопку, чтобы пользователь понимал, что идет обработка
            uploadLabel.innerHTML = 'Обработка (HEIC)...';
            uploadLabel.classList.add('loading');
            
            try {
                // Конвертируем HEIC в обычный JPEG
                const convertedBlob = await heic2any({
                    blob: file,
                    toType: "image/jpeg",
                    quality: 0.8
                });
                
                // heic2any иногда возвращает массив, если внутри несколько кадров
                file = Array.isArray(convertedBlob) ? convertedBlob[0] : convertedBlob;
            } catch (error) {
                console.error("Ошибка конвертации HEIC:", error);
                alert("Не удалось прочитать фото с iPhone. Попробуйте другой файл.");
                uploadLabel.innerHTML = 'Загрузить фото';
                uploadLabel.classList.remove('loading');
                return;
            }
        }

        // Загружаем готовый файл на холст
        const img = new Image();
        img.onload = function() {
            userPhoto = img;
            // Возвращаем кнопку в исходное состояние
            uploadLabel.innerHTML = 'Загрузить другое фото';
            uploadLabel.classList.remove('loading');
        }
        img.onerror = function() {
            alert("Браузер не смог прочитать этот формат. Попробуйте другой.");
            uploadLabel.innerHTML = 'Загрузить фото';
            uploadLabel.classList.remove('loading');
        }
        img.src = URL.createObjectURL(file);
    });

    // --- ЗАПУСК КАМЕРЫ ---
    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
            
            video.onloadedmetadata = () => {
                video.play();
                requestAnimationFrame(drawLoop);
            };
        } catch (err) {
            console.error("Ошибка камеры: ", err);
        }
    }

    // --- ГЛАВНЫЙ ЦИКЛ ОТРИСОВКИ ---
    function drawLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. Рисуем фото, если оно есть
        if (userPhoto) {
            const imgScale = Math.max(canvas.width / userPhoto.width, canvas.height / userPhoto.height);
            const imgX = (canvas.width / 2) - (userPhoto.width / 2) * imgScale;
            const imgY = (canvas.height / 2) - (userPhoto.height / 2) * imgScale;
            ctx.drawImage(userPhoto, imgX, imgY, userPhoto.width * imgScale, userPhoto.height * imgScale);
        }

        // 2. Включаем трафарет (дырку)
        ctx.save(); 
        ctx.beginPath();
        ctx.arc(canvas.width / 2, canvas.height / 2, 400, 0, Math.PI * 2);
        
        if (userPhoto) {
            ctx.clip(); 
        }

        // 3. Рисуем видео в дырке
        const camScale = Math.max(canvas.width / video.videoWidth, canvas.height / video.videoHeight);
        const camX = (canvas.width / 2) - (video.videoWidth / 2) * camScale;
        const camY = (canvas.height / 2) - (video.videoHeight / 2) * camScale;
        
        ctx.drawImage(video, camX, camY, video.videoWidth * camScale, video.videoHeight * camScale);

        ctx.restore();
        requestAnimationFrame(drawLoop);
    }

    initCamera();
</script>

</body>
</html>
