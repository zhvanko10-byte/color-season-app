<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yliko Color Code - Layer Test</title>
    <style>
        body { 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #111; 
            margin: 0; 
            font-family: sans-serif;
            overflow: hidden;
            gap: 15px;
        }
        canvas { 
            background: #000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            height: 85vh; 
            aspect-ratio: 9/16; 
            border-radius: 12px;
        }
        video { display: none; }
        
        /* Стили для красивой кнопки загрузки */
        .upload-btn {
            background: #007AFF;
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<label class="upload-btn">
    Загрузить фото
    <input type="file" id="imageUpload" accept="image/*">
</label>

<video id="videoElement" autoplay playsinline></video>
<canvas id="mainCanvas" width="1080" height="1920"></canvas>

<script>
    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    
    let userPhoto = null; // Здесь будем хранить загруженное фото

    // --- 1. ОБРАБОТКА ЗАГРУЗКИ ФОТО ---
    document.getElementById('imageUpload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        const img = new Image();
        img.onload = function() {
            userPhoto = img; // Сохраняем фото, когда оно загрузилось
        }
        img.src = URL.createObjectURL(file);
    });

    // --- 2. ЗАПУСК КАМЕРЫ ---
    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
            
            video.onloadedmetadata = () => {
                video.play();
                requestAnimationFrame(drawLoop);
            };
        } catch (err) {
            console.error("Ошибка камеры: ", err);
        }
    }

    // --- 3. ГЛАВНЫЙ ЦИКЛ ОТРИСОВКИ СЛОЕВ ---
    function drawLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Если пользователь загрузил фото, строим "бутерброд"
        if (userPhoto) {
            // СЛОЙ 1: Рисуем фото пользователя
            const imgScale = Math.max(canvas.width / userPhoto.width, canvas.height / userPhoto.height);
            const imgX = (canvas.width / 2) - (userPhoto.width / 2) * imgScale;
            const imgY = (canvas.height / 2) - (userPhoto.height / 2) * imgScale;
            ctx.drawImage(userPhoto, imgX, imgY, userPhoto.width * imgScale, userPhoto.height * imgScale);

            // СЛОЙ 2: Вырезаем "дырку" (имитация вырезанной одежды)
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            // Рисуем круг по центру размером 400px
            ctx.arc(canvas.width / 2, canvas.height / 2, 400, 0, Math.PI * 2);
            ctx.fill();

            // СЛОЙ 3: Готовимся рисовать камеру ПОД фотографией
            ctx.globalCompositeOperation = 'destination-over';
        }

        // РИСУЕМ КАМЕРУ (если фото есть, она отрисуется только в "дырке")
        const camScale = Math.max(canvas.width / video.videoWidth, canvas.height / video.videoHeight);
        const camX = (canvas.width / 2) - (video.videoWidth / 2) * camScale;
        const camY = (canvas.height / 2) - (video.videoHeight / 2) * camScale;
        
        ctx.drawImage(video, camX, camY, video.videoWidth * camScale, video.videoHeight * camScale);
        
        // Сбрасываем режимы смешивания
        ctx.globalCompositeOperation = 'source-over';
        
        requestAnimationFrame(drawLoop);
    }

    initCamera();
</script>

</body>
</html>
