<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yliko AI Wardrobe</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/heic2any/dist/heic2any.min.js"></script>
    <style>
        /* --- CSS ПЕРЕМЕННЫЕ И ТЕМЫ --- */
        :root {
            --bg-color: #f1f1f1;
            --text-color: #333;
            --accent-color: #007AFF; 
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.2);
            --status-bg: rgba(255, 255, 255, 0.7);
            --shadow-color: rgba(0,0,0,0.1);
            /* Переменные для шторки */
            --sheet-bg: #ffffff;
            --sheet-text: #333;
        }

        /* Светлая тема */
        body.theme-light {
            --bg-color: #ffffff;
            --text-color: #333;
            --accent-color: #007AFF;
            --glass-bg: rgba(0, 0, 0, 0.05);
            --glass-border: rgba(0, 0, 0, 0.1);
            --status-bg: rgba(255, 255, 255, 0.8);
            --shadow-color: rgba(0,0,0,0.1);
            --sheet-bg: #ffffff;
            --sheet-text: #333;
        }

        /* Темная тема */
        body.theme-dark {
            --bg-color: #000000;
            --text-color: #f1f1f1;
            --accent-color: #4CAF50;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --status-bg: rgba(0, 0, 0, 0.7);
            --shadow-color: rgba(255,255,255,0.05);
            --sheet-bg: #1a1a1a;
            --sheet-text: #f1f1f1;
        }

        /* Синяя тема */
        body.theme-blue {
            --bg-color: #1a2a44;
            --text-color: #f1f1f1;
            --accent-color: #03A9F4;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --status-bg: rgba(26, 42, 68, 0.7);
            --shadow-color: rgba(255,255,255,0.1);
            --sheet-bg: #1a2a44;
            --sheet-text: #f1f1f1;
        }

        /* Зеленая тема */
        body.theme-green {
            --bg-color: #1a3328;
            --text-color: #f1f1f1;
            --accent-color: #8BC34A;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --status-bg: rgba(26, 51, 40, 0.7);
            --shadow-color: rgba(255,255,255,0.1);
            --sheet-bg: #1a3328;
            --sheet-text: #f1f1f1;
        }

        /* Стеклянная тема (СВЕТЛАЯ) */
        body.theme-glass {
            --bg-color: transparent; 
            --text-color: #222; 
            --accent-color: #6200EE; 
            --glass-bg: rgba(255, 255, 255, 0.6); 
            --glass-border: rgba(255, 255, 255, 0.8);
            --status-bg: rgba(255, 255, 255, 0.9);
            --shadow-color: rgba(0,0,0,0.15);
            --sheet-bg: rgba(255, 255, 255, 0.95);
            --sheet-text: #222;
        }

        /* --- БАЗОВЫЕ СТИЛИ --- */
        body { 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            position: relative;
            transition: background-color 0.3s, color 0.3s;
        }

        canvas { 
            background: #000; 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 10; 
        }
        
        video { display: none; }
        
        #status-overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--accent-color);
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            z-index: 200; 
            background: var(--status-bg);
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 2px 10px var(--shadow-color);
            display: none;
            max-width: 80%;
        }

        /* --- ГЛАВНОЕ МЕНЮ --- */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--bg-color) 0%, #d8d8d8 100%);
            z-index: 150; 
            transition: opacity 0.5s, visibility 0.5s;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        body.theme-dark #start-screen {
            background: linear-gradient(135deg, #000 0%, #222 100%);
        }
        body.theme-blue #start-screen {
            background: linear-gradient(135deg, #1a2a44 0%, #2e4a6a 100%);
        }
        body.theme-green #start-screen {
            background: linear-gradient(135deg, #1a3328 0%, #2e5140 100%);
        }
        body.theme-glass #start-screen {
            background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(20px);
        }

        #start-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        /* --- СТИЛЬНОЕ ЛОГО --- */
        .logo-container {
            margin-bottom: 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .logo-svg {
            width: 110px;
            height: 110px;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 15px var(--accent-color));
            transition: all 0.5s ease;
        }

        .app-title {
            font-size: 28px;
            font-weight: bold;
            color: var(--text-color);
            margin: 0;
        }
        .app-welcome {
            font-size: 16px;
            color: var(--text-color);
            opacity: 0.8;
            margin-top: 5px;
        }

        .header-controls {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
        }
        .lang-switch, .theme-select {
            background: var(--glass-bg);
            backdrop-filter: blur(5px);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 15px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }

        .main-btns-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 300px;
            margin-bottom: 50px;
        }

        .req-footnote {
            position: absolute;
            bottom: 30px;
            font-size: 12px;
            color: var(--text-color);
            opacity: 0.7;
            cursor: pointer;
            text-decoration: underline;
            z-index: 10;
        }
        .req-footnote:hover { opacity: 1; }

        /* --- КНОПКИ --- */
        .btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 8px;
            box-sizing: border-box;
        }
        .btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.3);
        }
        
        .btn-main {
            background: var(--glass-bg);
            color: var(--text-color);
            border-color: var(--glass-border);
            padding: 16px 20px; 
            border-radius: 25px;
            font-size: 16px;
            width: 100%;
            box-shadow: 0 4px 15px var(--shadow-color);
        }
        .btn-main:hover {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }
        
        .btn-capture {
            background: #007AFF;
            border-color: #007AFF;
            padding: 15px 25px;
            border-radius: 25px;
            font-size: 16px;
        }

        /* Стили новой кнопки сохранения */
        .btn-save {
            background: #4CAF50;
            border-color: #4CAF50;
            padding: 15px 25px;
            border-radius: 25px;
            font-size: 16px;
            display: none; /* Скрыта по умолчанию */
        }
        
        .btn.loading {
            background: #f39c12;
            pointer-events: none;
            opacity: 0.8;
        }
        input[type="file"] { display: none; }

        /* --- AR КОНТРОЛЫ --- */
        .ar-controls-container {
            position: absolute;
            bottom: 30px;
            display: flex;
            flex-wrap: wrap; 
            justify-content: center;
            gap: 10px;
            z-index: 100;
            width: 100%;
            padding: 0 10px;
            box-sizing: border-box;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s;
        }
        .ar-controls-container.visible {
            opacity: 1;
            visibility: visible;
        }

        .ar-header-controls {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s;
        }
        .ar-header-controls.visible {
            opacity: 1;
            visibility: visible;
        }

        /* --- ВЫДВИЖНАЯ ПАНЕЛЬ ТРЕБОВАНИЙ --- */
        .bottom-sheet-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 300; 
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s;
        }
        .bottom-sheet-overlay.visible {
            opacity: 1;
            visibility: visible;
        }

        .bottom-sheet {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            /* Цвета теперь привязаны к переменным из :root */
            background: var(--sheet-bg); 
            border-radius: 20px 20px 0 0;
            z-index: 301;
            padding: 20px;
            box-sizing: border-box;
            transform: translateY(100%);
            transition: transform 0.3s ease-out, background 0.3s;
            box-shadow: 0 -4px 20px var(--shadow-color);
        }
        .bottom-sheet.open {
            transform: translateY(0);
        }

        .sheet-handle {
            width: 40px;
            height: 4px;
            background: var(--sheet-text);
            opacity: 0.2;
            border-radius: 2px;
            margin: 0 auto 15px auto;
            cursor: pointer;
        }

        .sheet-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 15px;
            text-align: center;
        }
        .sheet-content {
            font-size: 14px;
            color: var(--sheet-text);
            line-height: 1.5;
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .sheet-content li {
            margin-bottom: 10px;
            display: flex;
            align-items: start;
            gap: 8px;
        }
        
        .sheet-close-btn {
            background: var(--accent-color);
            color: white;
            padding: 10px 20px;
            border-radius: 15px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: background 0.3s;
        }
    </style>
</head>
<body class="theme-dark"> 

    <canvas id="mainCanvas" width="1080" height="1920"></canvas>
    
    <video id="videoElement" autoplay playsinline muted></video>
    
    <input type="file" id="imageUpload" accept="image/*, .heic, .heif">
    <div id="status-overlay"></div>

    <div id="start-screen">
        <div class="header-controls">
            <div class="lang-switch" id="langSwitch">UK 🇺🇦 | EN 🇬🇧</div>
            <select class="theme-select" id="themeSelect">
                <option value="theme-dark">Dark Темна</option>
                <option value="theme-light">Apple Світла</option>
                <option value="theme-blue">Midnight Синя</option>
                <option value="theme-green">Forest Зелена</option>
                <option value="theme-glass">Glass Скляна</option>
            </select>
        </div>

        <div class="logo-container">
            <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="dressGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="var(--accent-color)" />
                        <stop offset="100%" stop-color="var(--accent-color)" stop-opacity="0.3"/>
                    </linearGradient>
                </defs>
                <path d="M50 5 C53 5 56 8 56 11 C56 14 54 16 51 16 L51 20 L75 32 L72 36 L52 26 L52 32 C60 35 66 42 68 52 C68 52 72 75 85 90 L15 90 C28 75 32 52 32 52 C34 42 40 35 48 32 L48 26 L28 36 L25 32 L49 20 L49 16 C46 16 44 14 44 11 C44 8 47 5 50 5 Z" fill="url(#dressGradient)" stroke="var(--text-color)" stroke-width="1" stroke-opacity="0.2"/>
                <path d="M50 32 C42 50 25 70 15 90 L35 90 C45 70 50 50 50 32 Z" fill="rgba(255,255,255,0.2)"/>
                <path d="M50 32 C58 50 75 70 85 90 L65 90 C55 70 50 50 50 32 Z" fill="rgba(0,0,0,0.1)"/>
            </svg>
            <h1 class="app-title">Yliko AI Wardrobe</h1>
            <p class="app-welcome" id="welcomeText">Знайди свій ідеальний колір наживо</p>
        </div>

        <div class="main-btns-container">
            <button class="btn btn-main" id="startCameraBtn">📸 Камера</button>
            <label class="btn btn-main" id="uploadBtn">📂 Завантажити фото</label>
        </div>

        <div class="req-footnote" id="reqFootnote">ℹ️ Вимоги до фото</div>
    </div>

    <div class="ar-header-controls" id="arHeaderControls">
        <button class="btn" id="backToMenuBtn">⬅️ Назад</button>
        <button class="btn" id="switchCameraBtn">🔄 Камера</button>
    </div>
    <div class="ar-controls-container" id="arControls">
        <button class="btn btn-capture" id="captureBtn">📸 Зробити фото</button>
        <button class="btn btn-save" id="saveBtn">💾 Зберегти зображення</button>
    </div>

    <div class="bottom-sheet-overlay" id="sheetOverlay"></div>
    <div class="bottom-sheet" id="bottomSheet">
        <div class="sheet-handle" id="sheetHandle"></div>
        <div class="sheet-title" id="sheetTitle">Вимоги до фото:</div>
        <ul class="sheet-content" id="sheetContent"></ul>
        <button class="sheet-close-btn" id="sheetCloseBtn">Закрити</button>
    </div>

<script type="module">
    import { ImageSegmenter, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand(); 
    tg.MainButton.hide(); 

    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    
    const startScreen = document.getElementById('start-screen');
    const startCameraBtn = document.getElementById('startCameraBtn');
    const uploadBtn = document.getElementById('uploadBtn');
    const welcomeText = document.getElementById('welcomeText');
    const reqFootnote = document.getElementById('reqFootnote');
    const langSwitch = document.getElementById('langSwitch');
    const themeSelect = document.getElementById('themeSelect');

    const arControls = document.getElementById('arControls');
    const arHeaderControls = document.getElementById('arHeaderControls');
    const captureBtn = document.getElementById('captureBtn');
    const saveBtn = document.getElementById('saveBtn'); // Привязка кнопки
    const switchCameraBtn = document.getElementById('switchCameraBtn');
    const backToMenuBtn = document.getElementById('backToMenuBtn');

    const sheetOverlay = document.getElementById('sheetOverlay');
    const bottomSheet = document.getElementById('bottomSheet');
    const sheetHandle = document.getElementById('sheetHandle');
    const sheetTitle = document.getElementById('sheetTitle');
    const sheetContent = document.getElementById('sheetContent');
    const sheetCloseBtn = document.getElementById('sheetCloseBtn');

    const statusOverlay = document.getElementById('status-overlay');
    const imageUploadInput = document.getElementById('imageUpload');
    
    let processedCanvas = null; 
    let segmenter = null;
    let currentStream = null;
    let currentFacingMode = "user"; 
    let isDrawingLoopRunning = false;
    let isArModeActive = false; 
    
    let currentLang = 'uk'; 

    const UI_TEXT = {
        uk: {
            welcome: "Знайди свій ідеальний колір наживо",
            btn_camera: "📸 Камера",
            btn_upload: "📂 Завантажити фото",
            btn_save: "💾 Зберегти зображення", // Перевод
            footnote: "ℹ️ Вимоги до фото",
            btn_back: "⬅️ Назад",
            btn_capture: "📸 Зробити фото",
            btn_switch: "🔄 Камера",
            sheet_title: "Вимоги до фото:",
            sheet_content: `
                <li>✔️ Тільки одна людина в кадрі.</li>
                <li>✔️ Гарне освітлення (обличчям до вікна).</li>
                <li>✔️ Волосся прибране з плечей (відкрита шия).</li>
                <li>✔️ Одяг контрастує з фоном (не зливається).</li>
                <li>✔️ Поза прямо перед камерою (селфи або по пояс).</li>
            `,
            sheet_close: "Закрити",
            status_ai_load: "Завантаження ШІ...",
            status_ai_ready: "ШІ готовий!",
            status_processing: "Вирізаємо одяг...",
            status_done: "Готово!",
            status_saved: "Збережено у галерею!", // Перевод статуса
            err_ai: "Помилка завантаження ШІ.",
            err_clothes: "Нейромережа не знайшла одяг. Спробуйте інше фото!",
            err_camera: "Помилка камери."
        },
        en: {
            welcome: "Find your perfect color live",
            btn_camera: "📸 Camera",
            btn_upload: "📂 Upload Photo",
            btn_save: "💾 Save Image",
            footnote: "ℹ️ Photo requirements",
            btn_back: "⬅️ Back",
            btn_capture: "📸 Snap photo",
            btn_switch: "🔄 Camera",
            sheet_title: "Photo Requirements:",
            sheet_content: `
                <li>✔️ Single person only in the frame.</li>
                <li>✔️ Good lighting (face the window).</li>
                <li>✔️ Hair pulled back from shoulders (clear neck).</li>
                <li>✔️ Clothing contrasts with the background.</li>
                <li>✔️ Pose straight facing the camera (selfie or torso shot).</li>
            `,
            sheet_close: "Close",
            status_ai_load: "Loading AI...",
            status_ai_ready: "AI ready!",
            status_processing: "Cutting clothes...",
            status_done: "Done!",
            status_saved: "Saved to gallery!",
            err_ai: "AI Load Error.",
            err_clothes: "No clothes found. Try a different photo!",
            err_camera: "Camera Error."
        }
    }

    function updateLang(lang) {
        currentLang = lang;
        const text = UI_TEXT[lang];
        
        welcomeText.innerText = text.welcome;
        startCameraBtn.innerText = text.btn_camera;
        uploadBtn.childNodes[0].nodeValue = text.btn_upload; 
        saveBtn.innerText = text.btn_save; // Обновление текста
        reqFootnote.innerText = text.footnote;
        
        backToMenuBtn.innerText = text.btn_back;
        captureBtn.innerText = text.btn_capture;
        switchCameraBtn.innerText = text.btn_switch;
        
        sheetTitle.innerText = text.sheet_title;
        sheetContent.innerHTML = text.sheet_content;
        sheetCloseBtn.innerText = text.sheet_close;

        langSwitch.innerText = lang === 'uk' ? 'UK 🇺🇦 | EN' : 'UK | EN 🇬🇧';
    }

    langSwitch.addEventListener('click', () => {
        updateLang(currentLang === 'uk' ? 'en' : 'uk');
    });

    function applyTheme(themeName) {
        document.body.classList.remove('theme-light', 'theme-dark', 'theme-blue', 'theme-green', 'theme-glass');
        document.body.classList.add(themeName);
    }

    themeSelect.addEventListener('change', (e) => {
        applyTheme(e.target.value);
    });

    function toggleArMode(active) {
        isArModeActive = active;
        if (active) {
            arControls.classList.add('visible');
            arHeaderControls.classList.add('visible');
            startScreen.classList.add('hidden');
        } else {
            arControls.classList.remove('visible');
            arHeaderControls.classList.remove('visible');
            startScreen.classList.remove('hidden');
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
        }
    }

    function showStatus(text, duration = 2000) {
        statusOverlay.innerText = text;
        statusOverlay.style.display = 'block';
        if (duration > 0) {
            setTimeout(() => statusOverlay.style.display = 'none', duration);
        }
    }

    async function initAI() {
        showStatus(UI_TEXT[currentLang].status_ai_load, 0);
        try {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            segmenter = await ImageSegmenter.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_multiclass_256x256/float32/latest/selfie_multiclass_256x256.tflite",
                    delegate: "CPU" 
                },
                runningMode: "IMAGE",
                outputCategoryMask: true,
                outputConfidenceMasks: false
            });
            
            showStatus(UI_TEXT[currentLang].status_ai_ready, 2000);
            startCameraBtn.classList.remove('loading');
            uploadBtn.classList.remove('loading');
        } catch (error) {
            console.error(error);
            showStatus(UI_TEXT[currentLang].err_ai, 5000);
            statusOverlay.style.color = 'red';
        }
    }

    async function processImageToMask(img) {
        showStatus(UI_TEXT[currentLang].status_processing, 0);
        
        try {
            const segmentationResult = await segmenter.segment(img);
            const maskWidth = segmentationResult.categoryMask.width;
            const maskHeight = segmentationResult.categoryMask.height;
            const maskArray = segmentationResult.categoryMask.getAsUint8Array();

            const maskCanvas = document.createElement('canvas');
            maskCanvas.width = maskWidth;
            maskCanvas.height = maskHeight;
            const maskCtx = maskCanvas.getContext('2d');
            const maskImageData = maskCtx.createImageData(maskWidth, maskHeight);

            let clothesFound = false;

            for (let i = 0; i < maskArray.length; i++) {
                if (maskArray[i] === 4) { 
                    clothesFound = true;
                    maskImageData.data[i * 4 + 3] = 255; 
                } else {
                    maskImageData.data[i * 4 + 3] = 0; 
                }
            }

            if (!clothesFound) {
                alert(UI_TEXT[currentLang].err_clothes);
                showStatus("", 10);
                return;
            }

            maskCtx.putImageData(maskImageData, 0, 0);

            const MAX_SIZE = 1080;
            let pWidth = img.width;
            let pHeight = img.height;
            if (pWidth > MAX_SIZE || pHeight > MAX_SIZE) {
                const ratio = Math.min(MAX_SIZE / pWidth, MAX_SIZE / pHeight);
                pWidth = Math.round(pWidth * ratio);
                pHeight = Math.round(pHeight * ratio);
            }

            processedCanvas = document.createElement('canvas');
            processedCanvas.width = pWidth;
            processedCanvas.height = pHeight;
            const pCtx = processedCanvas.getContext('2d');

            pCtx.drawImage(img, 0, 0, pWidth, pHeight);
            pCtx.globalCompositeOperation = 'destination-out';
            pCtx.drawImage(maskCanvas, 0, 0, pWidth, pHeight);
            pCtx.globalCompositeOperation = 'source-over';

            showStatus(UI_TEXT[currentLang].status_done, 1500);
            
            // Логика: переключаем кнопку с камеры на кнопку сохранения
            captureBtn.style.display = 'none';
            saveBtn.style.display = 'flex';
            
            if (!isArModeActive) {
                toggleArMode(true);
                initCamera();
            }
            
        } catch (err) {
            console.error(err);
            showStatus(UI_TEXT[currentLang].err_clothes, 3000);
        }
    }

    async function initCamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
        }

        try {
            currentStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: currentFacingMode } 
            });
            video.srcObject = currentStream;
            
            video.onloadedmetadata = () => {
                video.play();
                if (!isDrawingLoopRunning) {
                    isDrawingLoopRunning = true;
                    requestAnimationFrame(drawLoop);
                }
            };
        } catch (err) {
            console.error("Ошибка камери: ", err);
            showStatus(UI_TEXT[currentLang].err_camera, 3000);
        }
    }

    function drawLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const camScale = Math.max(canvas.width / video.videoWidth, canvas.height / video.videoHeight);
        const camW = video.videoWidth * camScale;
        const camH = video.videoHeight * camScale;
        const camX = (canvas.width / 2) - (camW / 2);
        const camY = (canvas.height / 2) - (camH / 2);

        if (currentFacingMode === "user") {
            ctx.save();
            ctx.translate(canvas.width, 0); 
            ctx.scale(-1, 1); 
            ctx.drawImage(video, camX, camY, camW, camH);
            ctx.restore();
        } else {
            ctx.drawImage(video, camX, camY, camW, camH);
        }

        if (processedCanvas) {
            const scale = Math.max(canvas.width / processedCanvas.width, canvas.height / processedCanvas.height);
            const w = processedCanvas.width * scale;
            const h = processedCanvas.height * scale;
            const x = (canvas.width / 2) - (w / 2);
            const y = (canvas.height / 2) - (h / 2);
            
            ctx.drawImage(processedCanvas, x, y, w, h);
        }
        
        requestAnimationFrame(drawLoop);
    }

    startCameraBtn.addEventListener('click', () => {
        processedCanvas = null;
        // Возвращаем кнопку камеры и прячем кнопку сохранения
        captureBtn.style.display = 'flex';
        saveBtn.style.display = 'none';
        
        toggleArMode(true);
        initCamera();
    });

    backToMenuBtn.addEventListener('click', () => {
        toggleArMode(false);
    });

    switchCameraBtn.addEventListener('click', () => {
        currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
        initCamera();
    });

    captureBtn.addEventListener('click', async () => {
        captureBtn.classList.add('loading');
        captureBtn.innerText = 'Знімок...';

        const snapCanvas = document.createElement('canvas');
        snapCanvas.width = 1080;
        snapCanvas.height = 1920;
        const sCtx = snapCanvas.getContext('2d');

        const scale = Math.max(snapCanvas.width / video.videoWidth, snapCanvas.height / video.videoHeight);
        const camW = video.videoWidth * scale;
        const camH = video.videoHeight * scale;
        const camX = (snapCanvas.width / 2) - (camW / 2);
        const camY = (snapCanvas.height / 2) - (camH / 2);

        if (currentFacingMode === "user") {
            sCtx.save();
            sCtx.translate(snapCanvas.width, 0);
            sCtx.scale(-1, 1);
            sCtx.drawImage(video, camX, camY, camW, camH);
            sCtx.restore();
        } else {
            sCtx.drawImage(video, camX, camY, camW, camH);
        }

        const snapshot = new Image();
        snapshot.onload = async function() {
            await processImageToMask(snapshot);
            captureBtn.classList.remove('loading');
            captureBtn.innerText = UI_TEXT[currentLang].btn_capture;
        };
        snapshot.src = snapCanvas.toDataURL('image/jpeg', 0.9);
    });

    // Логика сохранения результата на устройство
    saveBtn.addEventListener('click', () => {
        // Забираем всё, что сейчас видно на холсте (камера + вырезанная одежда)
        const dataURL = canvas.toDataURL('image/jpeg', 1.0);
        
        const a = document.createElement('a');
        a.href = dataURL;
        a.download = `Yliko_AI_Wardrobe_${Date.now()}.jpg`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        
        showStatus(UI_TEXT[currentLang].status_saved, 2000);
    });

    uploadBtn.addEventListener('click', () => imageUploadInput.click()); 
    imageUploadInput.addEventListener('change', async function(e) {
        let file = e.target.files[0];
        if (!file) return;

        uploadBtn.childNodes[0].nodeValue = '... ';
        uploadBtn.classList.add('loading');

        const isHeic = file.name.toLowerCase().endsWith('.heic') || file.name.toLowerCase().endsWith('.heif');
        if (isHeic) {
            try {
                showStatus("HEIC...", 0);
                const convertedBlob = await heic2any({ blob: file, toType: "image/jpeg", quality: 0.8 });
                file = Array.isArray(convertedBlob) ? convertedBlob[0] : convertedBlob;
            } catch (error) {
                alert("Ошибка HEIC.");
                file = null;
            }
        }

        if (file) {
            const img = new Image();
            img.onload = async function() {
                processedCanvas = null;
                await processImageToMask(img); 
                uploadBtn.childNodes[0].nodeValue = UI_TEXT[currentLang].btn_upload;
                uploadBtn.classList.remove('loading');
            }
            img.src = URL.createObjectURL(file);
        } else {
             uploadBtn.childNodes[0].nodeValue = UI_TEXT[currentLang].btn_upload;
             uploadBtn.classList.remove('loading');
             showStatus("", 10);
        }
    });

    function openBottomSheet() {
        sheetOverlay.classList.add('visible');
        bottomSheet.classList.add('open');
    }
    function closeBottomSheet() {
        sheetOverlay.classList.remove('visible');
        bottomSheet.classList.remove('open');
    }

    reqFootnote.addEventListener('click', openBottomSheet);
    sheetOverlay.addEventListener('click', closeBottomSheet);
    sheetCloseBtn.addEventListener('click', closeBottomSheet);
    sheetHandle.addEventListener('click', closeBottomSheet);

    let touchStartY = 0;
    bottomSheet.addEventListener('touchstart', (e) => {
        touchStartY = e.touches[0].clientY;
    });
    bottomSheet.addEventListener('touchmove', (e) => {
        let touchCurrentY = e.touches[0].clientY;
        let diff = touchCurrentY - touchStartY;
        if (diff > 50) {
            closeBottomSheet();
        }
    });

    // --- СТАРТ ---
    updateLang('uk');
    applyTheme('theme-dark');
    initAI();

</script>
</body>
</html>
