<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yliko Color Code - AI Segmentation</title>
    <script src="https://cdn.jsdelivr.net/npm/heic2any/dist/heic2any.min.js"></script>
    <style>
        body { 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #111; 
            margin: 0; 
            font-family: sans-serif;
            overflow: hidden;
            gap: 15px;
        }
        canvas { 
            background: #000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            height: 85vh; 
            aspect-ratio: 9/16; 
            border-radius: 12px;
        }
        video { display: none; }
        
        .upload-btn {
            background: #4CAF50; /* Зеленый, покажем что ИИ готов */
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: background 0.3s;
            text-align: center;
            min-width: 250px;
        }
        .upload-btn.loading {
            background: #f39c12;
            pointer-events: none;
        }
        input[type="file"] { display: none; }
        
        #status {
            color: white;
            font-size: 14px;
            height: 20px;
        }
    </style>
</head>
<body>

<div id="status">Загрузка ИИ... Пожалуйста, подождите.</div>

<label class="upload-btn" id="uploadLabel" style="display: none;">
    Загрузить фото
    <input type="file" id="imageUpload" accept="image/*, .heic, .heif">
</label>

<video id="videoElement" autoplay playsinline></video>
<canvas id="mainCanvas" width="1080" height="1920"></canvas>

<script type="module">
    import { ImageSegmenter, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const uploadLabel = document.getElementById('uploadLabel');
    const statusText = document.getElementById('status');
    
    let userPhoto = null;
    let maskCanvas = null; // Здесь будем хранить "трафарет" одежды
    let segmenter = null;

    // --- 1. ИНИЦИАЛИЗАЦИЯ НЕЙРОСЕТИ ---
    async function initAI() {
        try {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            segmenter = await ImageSegmenter.createFromOptions(vision, {
                baseOptions: {
                    // Используем multiclass модель для разделения кожи, волос и одежды
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_multiclass_256x256/float32/latest/selfie_multiclass_256x256.tflite",
                    delegate: "GPU" // Пытаемся использовать видеокарту телефона
                },
                runningMode: "IMAGE",
                outputCategoryMask: true,
                outputConfidenceMasks: false
            });
            
            statusText.innerText = "ИИ готов к работе!";
            uploadLabel.style.display = "block"; // Показываем кнопку загрузки
            setTimeout(() => statusText.style.display = 'none', 3000);
        } catch (error) {
            console.error(error);
            statusText.innerText = "Ошибка загрузки ИИ.";
        }
    }

    // --- 2. ГЕНЕРАЦИЯ МАСКИ ОДЕЖДЫ ---
    async function processImageToMask(img) {
        statusText.style.display = 'block';
        statusText.innerText = "Нейросеть вырезает одежду...";
        
        // Отправляем фото в MediaPipe
        const segmentationResult = await segmenter.segment(img);
        
        // Получаем массив пикселей и их размеры
        const { width, height } = segmentationResult.categoryMask;
        const maskDataArray = segmentationResult.categoryMask.getAsUint8Array();
        
        // Создаем невидимый холст для маски
        maskCanvas = document.createElement('canvas');
        maskCanvas.width = width;
        maskCanvas.height = height;
        const maskCtx = maskCanvas.getContext('2d');
        
        const imageData = maskCtx.createImageData(width, height);
        
        // Проходим по каждому пикселю маски
        for (let i = 0; i < maskDataArray.length; i++) {
            // Категория 4 — это Одежда
            if (maskDataArray[i] === 4) {
                // Если это одежда, делаем пиксель абсолютно черным и непрозрачным
                imageData.data[i * 4 + 0] = 0;     // R
                imageData.data[i * 4 + 1] = 0;     // G
                imageData.data[i * 4 + 2] = 0;     // B
                imageData.data[i * 4 + 3] = 255;   // Alpha
            } else {
                // Если это фон, лицо или волосы — делаем прозрачным
                imageData.data[i * 4 + 3] = 0;     // Alpha
            }
        }
        
        // Кладем пиксели на холст маски
        maskCtx.putImageData(imageData, 0, 0);
        statusText.style.display = 'none';
    }

    // --- 3. ОБРАБОТКА ЗАГРУЗКИ ФОТО ---
    document.getElementById('imageUpload').addEventListener('change', async function(e) {
        let file = e.target.files[0];
        if (!file) return;

        uploadLabel.innerHTML = 'Обработка...';
        uploadLabel.classList.add('loading');

        const isHeic = file.name.toLowerCase().endsWith('.heic') || file.name.toLowerCase().endsWith('.heif');

        if (isHeic) {
            try {
                const convertedBlob = await heic2any({ blob: file, toType: "image/jpeg", quality: 0.8 });
                file = Array.isArray(convertedBlob) ? convertedBlob[0] : convertedBlob;
            } catch (error) {
                alert("Не удалось прочитать HEIC.");
                uploadLabel.innerHTML = 'Загрузить фото';
                uploadLabel.classList.remove('loading');
                return;
            }
        }

        const img = new Image();
        img.onload = async function() {
            userPhoto = img;
            await processImageToMask(img); // Запускаем нейросеть
            uploadLabel.innerHTML = 'Загрузить другое фото';
            uploadLabel.classList.remove('loading');
        }
        img.src = URL.createObjectURL(file);
    });

    // --- 4. ЗАПУСК КАМЕРЫ ---
    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
            
            video.onloadedmetadata = () => {
                video.play();
                requestAnimationFrame(drawLoop);
            };
        } catch (err) {
            console.error("Ошибка камеры: ", err);
        }
    }

    // --- 5. ГЛАВНЫЙ ЦИКЛ ОТРИСОВКИ ---
    function drawLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (userPhoto && maskCanvas) {
            // Расчет пропорций для центрирования
            const scale = Math.max(canvas.width / userPhoto.width, canvas.height / userPhoto.height);
            const x = (canvas.width / 2) - (userPhoto.width / 2) * scale;
            const y = (canvas.height / 2) - (userPhoto.height / 2) * scale;
            const w = userPhoto.width * scale;
            const h = userPhoto.height * scale;

            // СЛОЙ 1: Рисуем оригинальное фото пользователя
            ctx.drawImage(userPhoto, x, y, w, h);

            // СЛОЙ 2: Вырезаем "дырку" по форме маски одежды
            ctx.globalCompositeOperation = 'destination-out';
            ctx.drawImage(maskCanvas, x, y, w, h);

            // СЛОЙ 3: Готовимся подсунуть камеру ПОД фото
            ctx.globalCompositeOperation = 'destination-over';
        }

        // РИСУЕМ КАМЕРУ (если фото загружено, камера окажется строго под вырезом одежды)
        const camScale = Math.max(canvas.width / video.videoWidth, canvas.height / video.videoHeight);
        const camX = (canvas.width / 2) - (video.videoWidth / 2) * camScale;
        const camY = (canvas.height / 2) - (video.videoHeight / 2) * camScale;
        
        ctx.drawImage(video, camX, camY, video.videoWidth * camScale, video.videoHeight * camScale);

        // Возвращаем режим в норму для следующего кадра
        ctx.globalCompositeOperation = 'source-over';
        
        requestAnimationFrame(drawLoop);
    }

    // Запускаем всё
    initCamera();
    initAI();

</script>
</body>
</html>
