<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yliko Color Code</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000; overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            color: white;
            -webkit-tap-highlight-color: transparent;
        }

        .lang-switch {
            position: absolute; top: 30px; right: 30px;
            z-index: 500; font-size: 12px; letter-spacing: 2px;
        }
        .lang-btn { background: none; border: none; color: #555; cursor: pointer; padding: 5px; font-family: 'Montserrat', sans-serif; transition: 0.3s;}
        .lang-btn.active { color: white; font-weight: bold; }

        .page {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            background: #000;
            z-index: 100;
        }
        .page.active { display: flex; }

        #main-page h1 {
            font-family: 'Playfair Display', serif;
            font-size: 38px; font-style: italic;
            margin-bottom: 40px; letter-spacing: 1px; text-align: center;
        }
        .buttons-container { display: flex; flex-direction: column; gap: 20px; }
        .start-btn {
            background: none; color: white; border: 1px solid white;
            padding: 16px 50px; border-radius: 40px;
            font-size: 13px; text-transform: uppercase; letter-spacing: 3px;
            cursor: pointer; width: 260px; font-family: 'Montserrat', sans-serif;
            transition: 0.3s;
        }
        .start-btn:active { background: white; color: black; }

        .back-btn {
            position: absolute; top: 30px; left: 20px;
            background: none; border: none; color: white; font-size: 24px;
            cursor: pointer; z-index: 1000;
        }

        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; display: flex; flex-direction: column; pointer-events: none;
        }
        #header { padding: 80px 20px 20px; text-align: center; pointer-events: auto; }
        #palette-name {
            font-family: 'Playfair Display', serif; font-size: 44px;
            text-transform: uppercase; letter-spacing: 4px; font-style: italic;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); margin: 0;
        }
        .palette-swiper { width: 100%; height: 100%; pointer-events: auto; }
        .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; width: 85%; max-width: 400px; margin: auto; }
        .dot { aspect-ratio: 1/1; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); }

        /* ДИЗАЙН КАРТОК ТЕСТУ КОДОМ */
        #test-container {
            position: relative; width: 88%; max-width: 380px; height: 75vh;
            display: flex; align-items: center; justify-content: center;
        }
        
        .test-card {
            position: absolute; width: 100%; height: 100%;
            background: #111; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px; 
            display: none; 
            flex-direction: column; 
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .test-card.active { display: flex; }

        .card-top {
            background: #F4F0EB;
            color: #222;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 18px 10px;
            margin: 0;
            text-align: center;
        }

        .card-photo {
            width: 100%;
            height: 40vh;
            object-fit: cover;
            border-top: 1px solid rgba(0,0,0,0.05);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .card-desc {
            padding: 20px 15px;
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            font-weight: 500;
            line-height: 1.5;
            text-align: center;
        }

        .test-actions { 
            display: flex; 
            gap: 12px; 
            padding: 20px;
            background: #111; 
        }
        .t-btn { 
            flex: 1; padding: 16px; background: none; border: 1px solid white; 
            color: white; border-radius: 30px; text-transform: uppercase; 
            font-size: 12px; font-weight: 700; letter-spacing: 2px; 
            cursor: pointer; transition: 0.3s;
        }
        .t-btn:active { background: white; color: black; }
    </style>
</head>
<body>

    <div class="lang-switch">
        <button class="lang-btn active" id="l-uk" onclick="setLang('uk')">UKR</button> | 
        <button class="lang-btn" id="l-en" onclick="setLang('en')">ENG</button>
    </div>

    <div id="main-page" class="page active">
        <h1>Yliko Color Code</h1>
        <div class="buttons-container">
            <button class="start-btn" id="btn-start" onclick="openCamera()">Почати</button>
            <button class="start-btn" id="btn-test" onclick="openTest()">Тестування</button>
        </div>
    </div>

    <div id="app-page" class="page">
        <button class="back-btn" onclick="closeCamera()">✕</button>
        <div id="video-container"><video id="video" autoplay playsinline muted></video></div>
        <div id="ui-overlay">
            <div id="header"><h1 id="palette-name">LIGHT</h1></div>
            <div class="swiper palette-swiper">
                <div class="swiper-wrapper" id="palette-wrapper"></div>
                <div class="swiper-pagination"></div>
            </div>
        </div>
    </div>

    <div id="test-page" class="page">
        <button class="back-btn" onclick="showPage('main-page')">✕</button>
        <div id="test-container"></div>
    </div>
