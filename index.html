<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yliko Color Code - Stable iOS Version</title>
    <script src="https://cdn.jsdelivr.net/npm/heic2any/dist/heic2any.min.js"></script>
    <style>
        body { 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #111; 
            margin: 0; 
            font-family: sans-serif;
            overflow: hidden;
            position: relative;
        }
        canvas { 
            background: #000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            height: 85vh; 
            aspect-ratio: 9/16; 
            border-radius: 12px;
        }
        video { display: none; }
        
        #status {
            position: absolute;
            top: 20px;
            color: #4CAF50;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 20px;
        }

        /* --- ПАНЕЛЬ КНОПОК --- */
        .controls-container {
            position: absolute;
            bottom: 30px;
            display: flex;
            flex-wrap: wrap; 
            justify-content: center;
            gap: 10px;
            z-index: 100;
            display: none; 
            width: 100%;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
            text-align: center;
        }

        .btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.3);
        }

        .btn-capture {
            background: #007AFF;
            border-color: #007AFF;
        }

        .btn.loading {
            background: #f39c12;
            pointer-events: none;
            opacity: 0.8;
        }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div id="status">Загрузка ИИ... Пожалуйста, подождите.</div>

<video id="videoElement" autoplay playsinline></video>
<canvas id="mainCanvas" width="1080" height="1920"></canvas>

<div class="controls-container" id="controls">
    <label class="btn" id="uploadLabel">
        📂 Загрузить
        <input type="file" id="imageUpload" accept="image/*, .heic, .heif">
    </label>
    
    <button class="btn" id="switchCameraBtn">🔄 Смена камеры</button>
    
    <button class="btn btn-capture" id="captureBtn">📸 Сделать фото</button>
</div>

<script type="module">
    import { ImageSegmenter, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    
    const controls = document.getElementById('controls');
    const uploadLabel = document.getElementById('uploadLabel');
    const captureBtn = document.getElementById('captureBtn');
    const switchCameraBtn = document.getElementById('switchCameraBtn');
    const statusText = document.getElementById('status');
    
    let processedCanvas = null; 
    let segmenter = null;

    let currentStream = null;
    let currentFacingMode = "user"; 
    let isDrawingLoopRunning = false;

    // --- 1. ЗАГРУЗКА ИИ ---
    async function initAI() {
        try {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            segmenter = await ImageSegmenter.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_multiclass_256x256/float32/latest/selfie_multiclass_256x256.tflite",
                    // КРИТИЧЕСКОЕ ИЗМЕНЕНИЕ ДЛЯ СТАБИЛЬНОСТИ НА iOS:
                    delegate: "CPU" 
                },
                runningMode: "IMAGE",
                outputCategoryMask: true,
                outputConfidenceMasks: false
            });
            
            statusText.style.color = 'white';
            statusText.innerText = "ИИ готов!";
            controls.style.display = "flex";
            setTimeout(() => statusText.style.display = 'none', 3000);
        } catch (error) {
            console.error(error);
            statusText.style.color = 'red';
            statusText.innerText = "Ошибка загрузки ИИ. Проверьте интернет.";
        }
    }

    // --- 2. ФУНКЦИЯ ВЫРЕЗАНИЯ ---
    async function processImageToMask(img) {
        statusText.style.display = 'block';
        statusText.innerText = "Вырезаем одежду...";
        
        try {
            const segmentationResult = await segmenter.segment(img);
            const maskWidth = segmentationResult.categoryMask.width;
            const maskHeight = segmentationResult.categoryMask.height;
            const maskArray = segmentationResult.categoryMask.getAsUint8Array();

            const maskCanvas = document.createElement('canvas');
            maskCanvas.width = maskWidth;
            maskCanvas.height = maskHeight;
            const maskCtx = maskCanvas.getContext('2d');
            const maskImageData = maskCtx.createImageData(maskWidth, maskHeight);

            let clothesFound = false;

            for (let i = 0; i < maskArray.length; i++) {
                if (maskArray[i] === 4) { // 4 - код одежды
                    clothesFound = true;
                    maskImageData.data[i * 4 + 0] = 0; 
                    maskImageData.data[i * 4 + 1] = 0; 
                    maskImageData.data[i * 4 + 2] = 0; 
                    maskImageData.data[i * 4 + 3] = 255; 
                } else {
                    maskImageData.data[i * 4 + 3] = 0; 
                }
            }

            if (!clothesFound) {
                alert("Нейросеть не нашла одежду. Встаньте так, чтобы было видно плечи и торс!");
                statusText.style.display = 'none';
                return;
            }

            maskCtx.putImageData(maskImageData, 0, 0);

            // Жесткое ограничение размера для защиты от вылетов памяти
            const MAX_SIZE = 1080;
            let pWidth = img.width;
            let pHeight = img.height;
            if (pWidth > MAX_SIZE || pHeight > MAX_SIZE) {
                const ratio = Math.min(MAX_SIZE / pWidth, MAX_SIZE / pHeight);
                pWidth = Math.round(pWidth * ratio);
                pHeight = Math.round(pHeight * ratio);
            }

            processedCanvas = document.createElement('canvas');
            processedCanvas.width = pWidth;
            processedCanvas.height = pHeight;
            const pCtx = processedCanvas.getContext('2d');

            pCtx.drawImage(img, 0, 0, pWidth, pHeight);
            pCtx.globalCompositeOperation = 'destination-out';
            pCtx.drawImage(maskCanvas, 0, 0, pWidth, pHeight);
            pCtx.globalCompositeOperation = 'source-over';

            statusText.innerText = "Готово!";
            setTimeout(() => statusText.style.display = 'none', 2000);
            
        } catch (err) {
            console.error(err);
            statusText.innerText = "Ошибка при вырезании!";
        }
    }

    // --- 3. ОБРАБОТКА "СДЕЛАТЬ ФОТО" ---
    captureBtn.addEventListener('click', async () => {
        captureBtn.classList.add('loading');
        captureBtn.innerText = 'Снимок...';

        const snapCanvas = document.createElement('canvas');
        snapCanvas.width = 1080;
        snapCanvas.height = 1920;
        const sCtx = snapCanvas.getContext('2d');

        const scale = Math.max(snapCanvas.width / video.videoWidth, snapCanvas.height / video.videoHeight);
        const camX = (snapCanvas.width / 2) - (video.videoWidth / 2) * scale;
        const camY = (snapCanvas.height / 2) - (video.videoHeight / 2) * scale;
        const camW = video.videoWidth * scale;
        const camH = video.videoHeight * scale;

        if (currentFacingMode === "user") {
            sCtx.save();
            sCtx.translate(snapCanvas.width, 0);
            sCtx.scale(-1, 1);
            sCtx.drawImage(video, camX, camY, camW, camH);
            sCtx.restore();
        } else {
            sCtx.drawImage(video, camX, camY, camW, camH);
        }

        const snapshot = new Image();
        snapshot.onload = async function() {
            await processImageToMask(snapshot);
            captureBtn.classList.remove('loading');
            captureBtn.innerText = '📸 Сделать фото';
        };
        snapshot.src = snapCanvas.toDataURL('image/jpeg', 0.9);
    });

    // --- 4. ОБРАБОТКА "ЗАГРУЗИТЬ ФОТО" ---
    document.getElementById('imageUpload').addEventListener('change', async function(e) {
        let file = e.target.files[0];
        if (!file) return;

        uploadLabel.innerHTML = 'Обработка...';
        uploadLabel.classList.add('loading');

        const isHeic = file.name.toLowerCase().endsWith('.heic') || file.name.toLowerCase().endsWith('.heif');

        if (isHeic) {
            try {
                const convertedBlob = await heic2any({ blob: file, toType: "image/jpeg", quality: 0.8 });
                file = Array.isArray(convertedBlob) ? convertedBlob[0] : convertedBlob;
            } catch (error) {
                alert("Не удалось прочитать HEIC.");
                uploadLabel.innerHTML = '📂 Загрузить';
                uploadLabel.classList.remove('loading');
                return;
            }
        }

        const img = new Image();
        img.onload = async function() {
            await processImageToMask(img); 
            uploadLabel.innerHTML = '📂 Загрузить';
            uploadLabel.classList.remove('loading');
        }
        img.src = URL.createObjectURL(file);
    });

    // --- 5. УПРАВЛЕНИЕ КАМЕРОЙ ---
    async function initCamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
        }

        try {
            currentStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: currentFacingMode } 
            });
            video.srcObject = currentStream;
            
            video.onloadedmetadata = () => {
                video.play();
                if (!isDrawingLoopRunning) {
                    isDrawingLoopRunning = true;
                    requestAnimationFrame(drawLoop);
                }
            };
        } catch (err) {
            console.error("Ошибка камеры: ", err);
        }
    }

    switchCameraBtn.addEventListener('click', () => {
        currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
        initCamera();
    });

    // --- 6. ЦИКЛ ОТРИСОВКИ ---
    function drawLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const camScale = Math.max(canvas.width / video.videoWidth, canvas.height / video.videoHeight);
        const camX = (canvas.width / 2) - (video.videoWidth / 2) * camScale;
        const camY = (canvas.height / 2) - (video.videoHeight / 2) * camScale;
        const camW = video.videoWidth * camScale;
        const camH = video.videoHeight * camScale;

        if (currentFacingMode === "user") {
            ctx.save();
            ctx.translate(canvas.width, 0); 
            ctx.scale(-1, 1); 
            ctx.drawImage(video, camX, camY, camW, camH);
            ctx.restore();
        } else {
            ctx.drawImage(video, camX, camY, camW, camH);
        }

        if (processedCanvas) {
            const scale = Math.max(canvas.width / processedCanvas.width, canvas.height / processedCanvas.height);
            const x = (canvas.width / 2) - (processedCanvas.width / 2) * scale;
            const y = (canvas.height / 2) - (processedCanvas.height / 2) * scale;
            const w = processedCanvas.width * scale;
            const h = processedCanvas.height * scale;
            
            ctx.drawImage(processedCanvas, x, y, w, h);
        }
        
        requestAnimationFrame(drawLoop);
    }

    initCamera();
    initAI();
</script>
</body>
</html>
